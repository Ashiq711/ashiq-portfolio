{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- HERO -->
<section class="page-hero hero-about">
    <div class="about-hero-box">
        <h1>My Journey</h1>
        <div class="hero-orange-line"></div>
        <p>A deeper look into my journey, experiences, and growth.</p>
    </div>
</section>

<!-- JOURNEY SECTION -->
<section class="aa-journey-section">

    <!-- Main vertical line -->
    <div class="timeline-main-line"></div>

    <div class="aa-journey-wrapper">

        {% for journey in journeys %}
        <div class="timeline-entry">

            <!-- LEFT YEAR -->
            <div class="timeline-year">
                {{ journey.period }}
            </div>

            <!-- CENTER ICON -->
            <div class="timeline-center">

                <div class="timeline-dot"></div>

                <div class="timeline-icon">
                    <i class="{{ journey.icon }}"></i>
                </div>

            </div>

            <!-- RIGHT CARD -->
            <div class="timeline-card">
                <h2>{{ journey.title }}</h2>
                <p>{{ journey.description }}</p>
            </div>

        </div>
        {% endfor %}

    </div>
</section>

<style>
/* HERO */
.about-hero-box{
    position: relative;
    z-index: 2;
    text-align: center;
}

.about-hero-box h1{
    color: white;
    font-size: 82px;
    font-weight: 800;
    margin-bottom: 12px;
}

.hero-orange-line{
    width: 90px;
    height: 4px;
    background: #ED7014;
    margin: 20px auto;
    border-radius: 10px;
}

.about-hero-box p{
    color: #d0d0d0;
    font-size: 26px;
}

/* SECTION */
.aa-journey-section{
    position: relative;
    background: #050505;
    padding: 90px 0;
}

/* VERTICAL LINE */
.timeline-main-line{
    position: absolute;
    left: 27%;
    top: 80px;
    bottom: 80px;
    width: 3px;
    background: #ED7014;
    box-shadow: 0 0 15px rgba(237,112,20,0.7);
}

.aa-journey-wrapper{
    width: 75%;
    max-width: 1500px;
    margin: auto;
}

/* ENTRY */
.timeline-entry{
    display: grid;
    grid-template-columns: 260px 140px 1fr;
    gap: 28px;
    align-items: center;
    margin-bottom: 26px;
}

/* YEAR */
.timeline-year{
    color: #ED7014;
    font-size: 34px;
    font-weight: 700;
    text-align: right;
}

/* CENTER */
.timeline-center{
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.timeline-dot{
    position: absolute;
    left: -14px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: white;
    border: 4px solid #ED7014;
    box-shadow: 0 0 18px rgba(237,112,20,0.9);
}

.timeline-icon{
    width: 68px;
    height: 68px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(8px);
}

.timeline-icon i{
    color: #ED7014;
    font-size: 26px;
}

/* CARD */
.timeline-card{
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 4px solid #ED7014;
    border-radius: 18px;
    padding: 24px 28px;
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
}

.timeline-card:hover{
    transform: translateY(-6px);
    box-shadow: 0 0 30px rgba(237,112,20,0.15);
}

.timeline-card h2{
    color: white;
    font-size: 24px;
    margin-bottom: 18px;
    font-weight: 700;
}

.timeline-card p{
    color: #c8c8c8;
    font-size: 15px;
    line-height: 1.8;
}

/* TABLET */
@media (max-width: 1200px){
    .timeline-card h2{
        font-size: 30px;
    }

    .timeline-card p{
        font-size: 17px;
    }

    .timeline-year{
        font-size: 22px;
    }
}

/* MOBILE */
@media (max-width: 992px){

    .about-hero-box h1{
        font-size: 48px;
    }

    .about-hero-box p{
        font-size: 18px;
    }

    .timeline-main-line{
        left: 25px;
    }

    .timeline-entry{
        grid-template-columns: 90px 1fr;
        gap: 20px;
    }

    .timeline-year{
        grid-column: span 2;
        text-align: left;
        padding-left: 80px;
        font-size: 20px;
    }

    .timeline-card{
        padding: 22px;
    }

    .timeline-card h2{
        font-size: 24px;
    }

    .timeline-card p{
        font-size: 15px;
    }

    .timeline-icon{
        width: 65px;
        height: 65px;
    }

    .timeline-icon i{
        font-size: 24px;
    }
}
</style>

{% endblock %}

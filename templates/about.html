{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="page-hero hero-about">
    <div class="about-hero-box">
        <h1>My Journey</h1>
        <div class="hero-orange-line"></div>
        <p>A deeper look into my journey, experiences, and growth.</p>
    </div>
</section>

<section class="journey-clean-section">
    <div class="journey-clean-wrapper">

        {% for journey in journeys %}
        <div class="journey-clean-card">

            <div class="journey-left">
                <div class="journey-period">
                    {{ journey.period }}
                </div>

                <div class="journey-icon">
                    <i class="{{ journey.icon }}"></i>
                </div>
            </div>

            <div class="journey-right">
                <h2>{{ journey.title }}</h2>
                <p>{{ journey.description }}</p>
            </div>

        </div>
        {% endfor %}

    </div>
</section>

<style>
.about-hero-box{
    text-align:center;
}

.about-hero-box h1{
    color:white;
    font-size:64px;
    font-weight:800;
}

.hero-orange-line{
    width:80px;
    height:4px;
    background:#ED7014;
    margin:18px auto;
    border-radius:20px;
}

.about-hero-box p{
    color:#d0d0d0;
    font-size:20px;
}

.journey-clean-section{
    background:#050505;
    padding:70px 0;
}

.journey-clean-wrapper{
    width:82%;
    max-width:1400px;
    margin:auto;
}

.journey-clean-card{
    display:flex;
    align-items:center;
    gap:30px;
    margin-bottom:28px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:22px 26px;
    transition:0.3s ease;
}

.journey-clean-card:hover{
    transform:translateY(-4px);
    box-shadow:0 0 25px rgba(237,112,20,0.14);
}

.journey-left{
    width:220px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.journey-period{
    color:#ED7014;
    font-size:22px;
    font-weight:700;
}

.journey-icon{
    width:68px;
    height:68px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.12);
}

.journey-icon i{
    color:#ED7014;
    font-size:26px;
}

.journey-right{
    flex:1;
    border-left:4px solid #ED7014;
    padding-left:26px;
}

.journey-right h2{
    color:white;
    font-size:24px;
    margin-bottom:12px;
    font-weight:700;
}

.journey-right p{
    color:#c8c8c8;
    font-size:15px;
    line-height:1.8;
}

/* Mobile */
@media (max-width: 992px){

    .about-hero-box h1{
        font-size:42px;
    }

    .about-hero-box p{
        font-size:16px;
    }

    .journey-clean-wrapper{
        width:92%;
    }

    .journey-clean-card{
        flex-direction:column;
        align-items:flex-start;
    }

    .journey-left{
        width:100%;
        flex-direction:row;
        justify-content:space-between;
    }

    .journey-right{
        width:100%;
        border-left:none;
        border-top:4px solid #ED7014;
        padding-left:0;
        padding-top:16px;
    }

    .journey-right h2{
        font-size:20px;
    }

    .journey-right p{
        font-size:14px;
    }
}
</style>

{% endblock %}

{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <h1>{{ article.title }}</h1>
    <p class="text-muted">
        {{ article.created_at|date:"M d, Y" }} • {{ article.topic }}
    </p>

    <img src="{{ article.image.url }}" class="img-fluid my-4">

    <p>{{ article.content }}</p>

    {% if article.external_link %}
    <a href="{{ article.external_link }}" target="_blank"
       class="btn btn-outline-light mt-3">
        View Reference
    </a>
    {% endif %}

</div>

{% endblock %}
